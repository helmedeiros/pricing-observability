# Observability stack for the Pricing Decision Platform.
# v0.0.1 = logs (Filebeat + Elasticsearch + Kibana).
# v0.0.2 = traces (OTel Collector + Jaeger w/ ES backend) — see ADR-0002.
# v0.0.3 = metrics (Prometheus + Grafana) — see ADR-0003.
#
# This compose is designed to run ALONGSIDE the platform compose at
# decision-gateway/docker-compose.yaml. The Filebeat container reads
# the host's Docker socket via /var/run/docker.sock and tails every
# container's stdout, then filters to platform containers only by
# matching the ghcr.io/helmedeiros/{markup-svc,traffic-gen,decision-gateway}
# image prefix. So the two compose stacks do not need to share a
# Docker network -- Filebeat reaches the platform via the Docker
# daemon, not via service-name DNS.
#
# Usage:
#   # Bring the platform up first:
#   docker compose -f /path/to/decision-gateway/docker-compose.yaml up -d
#
#   # Then bring the observability stack up:
#   docker compose -f docker-compose.observability.yaml up
#
#   # Open Kibana at http://localhost:5601
#   # Create the index pattern 'platform-logs-*'
#   # Query: attrs.correlation_id : "<some uuid>"
#
# Resource footprint: Elasticsearch's JVM heap is the dominant cost.
# 1 GB heap (-Xms1g -Xmx1g) keeps the dev-machine budget under 2 GB.
# Production deployments size up + persist data to a real volume.
# See ADR-0001's Performance section + cookbook for the rationale.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    environment:
      - discovery.type=single-node
      # Dev-only: disable xpack security so curl + Kibana + Filebeat
      # connect without TLS cert provisioning. Production gates ES
      # behind a reverse proxy or enables the full xpack story.
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=pricing-observability
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 5s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.4
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"

  # One-shot data-view provisioning. Polls Kibana until /api/status
  # reports available, then POSTs the bundled saved-objects NDJSON
  # to /api/saved_objects/_import?overwrite=true so the platform-logs-*
  # + jaeger-span-* data views appear on every operator's Kibana
  # without manual setup. Also sets defaultIndex=platform-logs so
  # Discover opens directly on the logs view. See ADR-0004.
  kibana-init:
    image: curlimages/curl:8.5.0
    depends_on:
      - kibana
    restart: "no"
    volumes:
      - ./config/kibana-init.sh:/etc/kibana-init/kibana-init.sh:ro
      - ./config/kibana-saved-objects.ndjson:/etc/kibana-init/saved-objects.ndjson:ro
    entrypoint: ["/bin/sh", "/etc/kibana-init/kibana-init.sh"]

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.4
    depends_on:
      elasticsearch:
        condition: service_healthy
    user: root
    # --strict.perms=false because the bind-mounted config + sock
    # often have host-side ownership Filebeat would otherwise refuse.
    command:
      - "--strict.perms=false"
      - "-e"
    volumes:
      - ./config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Filebeat needs read access to container log files for the
      # docker.autodiscover provider's log paths.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  # v0.0.2 traces phase (see ADR-0002): OTel Collector ingests OTLP
  # from platform services and forwards to Jaeger; Jaeger persists
  # spans in the same Elasticsearch instance the logs phase already
  # stands up.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver (platform services send here)
      - "4318:4318"   # OTLP HTTP receiver (alternative for browsers / curl)
    depends_on:
      - jaeger

  spark-dependencies:
    image: ghcr.io/jaegertracing/spark-dependencies/spark-dependencies:latest
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - STORAGE=elasticsearch
      - ES_NODES=http://elasticsearch:9200
      - ES_NODES_WAN_ONLY=true
      - INTERVAL=120
    entrypoint: ["/bin/sh", "/etc/spark-deps/spark-deps-loop.sh"]
    volumes:
      - ./config/spark-deps-loop.sh:/etc/spark-deps/spark-deps-loop.sh:ro

  jaeger:
    image: jaegertracing/all-in-one:1.55
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR=true
      - PROMETHEUS_QUERY_NORMALIZE_CALLS=true
      - PROMETHEUS_QUERY_NORMALIZE_DURATION=true
    ports:
      - "16686:16686"

  # v0.0.3 metrics phase (see ADR-0003): Prometheus scrapes platform
  # /metrics endpoints (markup-svc v0.1.8+ ships its endpoint via
  # markup-svc/ADR-0019; decision-gateway + traffic-gen land as their
  # own per-repo ADRs ship). Grafana provisions Prometheus + ES +
  # Jaeger as datasources at startup and ships a starter dashboard.
  prometheus:
    image: prom/prometheus:v2.48.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # 7-day retention matches the dev posture; production overrides
      # via a real volume + a sized retention.
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      # Persist exemplars so Grafana panels can drill from a histogram
      # bucket to the Jaeger trace via the trace_id label model-registry
      # emits on registry_deploy_duration_seconds (ADR-0011). Default
      # capacity is 100,000 exemplars — sufficient at the registry's
      # operator-class throughput (admin-class endpoints, not per-request).
      - "--enable-feature=exemplar-storage"
      # Log every PromQL query so operators can see what Jaeger's
      # Monitor tab + Grafana actually ask Prometheus for. Routed to
      # the container's stderr so 'docker logs prometheus' captures it.
      - "--log.level=info"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      # markup-svc exposes /metrics on the platform compose network;
      # Prometheus reaches it via host.docker.internal -> the gateway
      # which proxies through. Same pattern the OTel Collector uses
      # for the OTLP receiver.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.2.3
    depends_on:
      - prometheus
    environment:
      # Dev-only: skip the login page. Production gates Grafana
      # behind SSO + a reverse proxy.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./config/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      # Dashboard JSON files live OUTSIDE the provisioning/dashboards
      # directory (which is where Grafana looks for the provider .yaml
      # only). The provider config above points options.path here.
      - ./config/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # 3030 (not 3000) to leave room for the node/react default
      # dev port which operators commonly run on 3000.
      - "3030:3000"   # Grafana UI

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  alert-sink:
    image: python:3.12-alpine
    entrypoint: ["python3", "/etc/alert-sink/alert-sink.py"]
    volumes:
      - ./config/alert-sink.py:/etc/alert-sink/alert-sink.py:ro
    ports:
      - "9100:9000"
