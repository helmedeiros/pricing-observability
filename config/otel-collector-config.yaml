receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

connectors:
  spanmetrics:
    namespace: traces.spanmetrics
    # Buckets extend past 1s (1500ms, 2s, 3s, 5s) so a real gateway p99
    # regression lands in a resolvable bucket rather than jumping from
    # 1s straight to 5s (which produced the misleading 1.3-4.8 s p99
    # estimates flagged in decision-gateway/scientific/platform-v0.1.0).
    histogram:
      explicit:
        buckets:
          [100us, 250us, 500us, 1ms, 2ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 1500ms, 2s, 3s, 5s]
    metrics_flush_interval: 15s

processors:
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 5000
    policies:
      - name: errors
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: slow-traces
        type: latency
        latency: { threshold_ms: 10 }
      - name: admin-paths
        type: string_attribute
        string_attribute:
          key: http.url
          values: [".*/admin.*"]
          enabled_regex_matching: true
      # model-registry write surface (ADR-0019). The operator-facing
      # /upload + /promote + /rollback endpoints are admin-class
      # (a few invocations per day). Dropping them to the 10%
      # probabilistic sampler means a mid-firing investigation may
      # find that the trace for the offending operator action was
      # silently discarded. Keep 100% — the volume is negligible
      # vs the value of always having the trace available.
      #
      # The registry's WithServerSpan middleware sets http.route to
      # the matched-pattern (not http.url), so the policy keys on
      # http.route.
      - name: registry-writes
        type: string_attribute
        string_attribute:
          key: http.route
          values: ["/upload", "/promote", "/rollback"]
          enabled_regex_matching: false
      - name: probabilistic-10pct
        type: probabilistic
        probabilistic: { sampling_percentage: 10 }

exporters:
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    const_labels:
      platform: pricing-decision

  debug:
    verbosity: basic

service:
  pipelines:
    # Raw 100% pipeline: every span fans out to spanmetrics (so SPM
    # stays exact) + debug stdout. No sampling here -- spanmetrics
    # must see every span for the calls + latency aggregates to be
    # accurate. See ADR-0013.
    traces:
      receivers: [otlp]
      exporters: [spanmetrics, debug]

    # Sampled pipeline to Jaeger storage. tail_sampling buffers
    # 10s of spans then decides: 100% of errors + 100% of slow traces
    # (> 10ms) + 10% probabilistic. Drops the rest before they hit
    # Elasticsearch.
    traces/sampled:
      receivers: [otlp]
      processors: [tail_sampling]
      exporters: [otlp]

    metrics:
      receivers: [spanmetrics]
      exporters: [prometheus]

  telemetry:
    logs:
      level: info
