# Prometheus scrape config for the Pricing Decision Platform.
# See ADR-0003.
#
# Scrapes markup-svc's /metrics endpoint via host.docker.internal
# (the gateway between the observability compose network and the
# platform compose network). decision-gateway + traffic-gen do not
# yet expose /metrics — added as those repos ship their own metric
# adapters.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: pricing-decision

rule_files:
  - /etc/prometheus/prometheus-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # markup-svc: exposes /metrics on the same listener as /decide
  # (port 8080 inside the compose network). Reachable from the
  # observability stack via host.docker.internal because the
  # platform compose and observability compose run on separate
  # Docker networks.
  - job_name: markup-svc
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: markup-svc

  - job_name: decision-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          service: decision-gateway

  - job_name: traffic-gen
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:9101"]
        labels:
          service: traffic-gen

  # model-registry control-plane v0.0.4+ (ADR-0011). Exposes
  # registry_http_* + the lifecycle counters
  # (uploads / promotions / rollbacks / deploys / state_drift)
  # plus registry_deploy_duration_seconds with trace_id
  # exemplars (OpenMetrics). --enable-feature=exemplar-storage
  # on the prometheus container is what lets those exemplars
  # survive into Grafana drill-downs. The registry's default
  # listen is :8090 inside its own compose network; we publish
  # it on host 8091 to avoid the collision with decision-gateway.
  - job_name: model-registry
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:8091"]
        labels:
          service: model-registry

  # OTel Collector spanmetrics. The Collector aggregates spans into
  # traces_spanmetrics_calls_total + traces_spanmetrics_duration_milliseconds
  # histograms and exposes them on :8889/metrics. Jaeger's Monitor
  # tab queries these series via METRICS_STORAGE_TYPE=prometheus. See
  # ADR-0005.
  - job_name: otel-collector-spanmetrics
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector-spanmetrics
