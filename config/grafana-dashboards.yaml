# Grafana dashboard provider config. Tells Grafana where to find
# dashboard JSON files at startup. See ADR-0003.

apiVersion: 1

providers:
  - name: pricing-platform
    orgId: 1
    folder: Pricing Platform
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
