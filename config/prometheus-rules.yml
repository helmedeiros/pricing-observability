groups:
  - name: markup-svc
    interval: 30s
    rules:
      - alert: MarkupDecideErrorRateHigh
        expr: sum(rate(markup_decide_total{outcome="error"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: markup-svc
        annotations:
          summary: "markup-svc Decide error rate > 0.1/s for 5m"
          description: "markup_decide_total{outcome=error} rate is {{ $value | printf \"%.3f\" }} req/s. Likely engine fault, guardrails veto storm, or upstream pressure."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/MarkupDecideErrorRateHigh.md"

      - alert: MarkupDecideP99Slow
        expr: histogram_quantile(0.99, sum by(le) (rate(markup_decide_duration_seconds_bucket[5m]))) > 0.005
        for: 5m
        labels:
          severity: warning
          service: markup-svc
        annotations:
          summary: "markup-svc Decide p99 > 5ms for 5m"
          description: "Engine p99 is {{ $value | printf \"%.4f\" }}s. Investigate adapter, rule-set size, or upstream pressure."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/MarkupDecideP99Slow.md"

      - alert: MarkupMetricsScrapeDown
        expr: up{job="markup-svc"} == 0
        for: 2m
        labels:
          severity: critical
          service: markup-svc
        annotations:
          summary: "Prometheus cannot scrape markup-svc /metrics"
          description: "Target {{ $labels.instance }} has been down for 2m. Check gateway routing for /metrics and that markup-svc is running with --metrics-enabled."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/MarkupMetricsScrapeDown.md"

  - name: platform-spans
    interval: 30s
    rules:
      - alert: GatewayRequestErrorRateHigh
        expr: sum(rate(traces_spanmetrics_calls_total{service_name="decision-gateway",span_kind="SPAN_KIND_SERVER",status_code="STATUS_CODE_ERROR"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: decision-gateway
        annotations:
          summary: "decision-gateway server-span error rate > 0.1/s for 5m"
          description: "gateway.request span error rate is {{ $value | printf \"%.3f\" }}/s. Cross-check gateway.access logs in Kibana for the matching trace_ids."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/GatewayRequestErrorRateHigh.md"

      - alert: GatewayRequestP99Slow
        expr: histogram_quantile(0.99, sum by(le) (rate(traces_spanmetrics_duration_milliseconds_bucket{service_name="decision-gateway",span_kind="SPAN_KIND_SERVER"}[5m]))) > 5
        for: 10m
        labels:
          severity: warning
          service: decision-gateway
        annotations:
          summary: "decision-gateway gateway.request p99 > 5ms for 10m"
          description: "Server-span p99 latency is {{ $value | printf \"%.2f\" }}ms. Investigate upstream pool, h2c flag, or markup-svc engine pressure via Jaeger Monitor."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/GatewayRequestP99Slow.md"

  - name: admin-changes
    interval: 30s
    rules:
      # Fires the moment an /admin POST gets rejected with 4xx. This is
      # the new failure mode introduced by markup-svc/ADR-0026 + ADR-0008
      # in decision-gateway: hot-reload (markup-svc /admin/reload), hot-
      # replace (markup-svc /admin/guardrails), or routes-replace (gateway
      # /admin/routes) was rejected because Diagnose / validation failed
      # on the new config. Operator intent was clear (someone POSTed);
      # platform refused. Get a human to the keyboard fast: the
      # currently-serving config is keeping customers up but the operator
      # almost certainly thinks the new config is live.
      - alert: AdminHotReloadRejected
        expr: sum(increase(gateway_requests_total{route="/admin",status=~"4.."}[5m])) > 0
        for: 1m
        labels:
          severity: warning
          service: decision-gateway
        annotations:
          summary: "Hot-reload / admin POST rejected — somebody tried to deploy bad config"
          description: |
            {{ $value | printf "%.0f" }} POST 400 response(s) in the last 5m. Most likely
            a markup-svc /admin/reload or /admin/guardrails that failed Diagnose, or a
            decision-gateway /admin/routes with an invalid route table.
            Cross-check in Kibana: msg:"gateway.access" AND attrs.path:"/admin/*" AND attrs.status:>=400
            Re-run GET /admin/diagnose on markup-svc for the issue list.
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/AdminHotReloadRejected.md"

  # model-registry control-plane alerts (ADR-0019). The counters
  # registry_uploads_total / registry_promotions_total /
  # registry_rollbacks_total / registry_deploys_total /
  # registry_state_drift_total + the registry_deploy_duration_seconds
  # histogram are emitted by model-registry v0.0.4+. State drift is
  # critical because it represents a should-never-happen invariant
  # (concurrent /promote landed between a /rollback's preview-hash
  # read and its committed-hash write); the other three catch
  # sustained regressions, not single bad requests.
  - name: model-registry
    interval: 30s
    rules:
      - alert: RegistryUploadFailureRate
        expr: sum(rate(registry_uploads_total{outcome!="ok"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: model-registry
        annotations:
          summary: "model-registry /upload failure rate > 0.05/s for 5m"
          description: "registry_uploads_total{outcome!=ok} rate is {{ $value | printf \"%.3f\" }} req/s. Outcomes covered: invalid (malformed multipart), too_large (over the 16 MB ceiling), substrate_error (fsstore write failed)."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/RegistryUploadFailureRate.md"

      - alert: RegistryPromotionFailureRate
        expr: sum(rate(registry_promotions_total{outcome=~"failed|partial"}[5m])) > 0.02
        for: 5m
        labels:
          severity: warning
          service: model-registry
        annotations:
          summary: "model-registry /promote failed-or-partial rate > 0.02/s for 5m"
          description: "registry_promotions_total{outcome=~failed|partial} rate is {{ $value | printf \"%.3f\" }} req/s. failed = all instances rejected the rolling push; partial = some did but state committed per ADR-0005. Sustained partial is the same operator action as failed: a sick instance needs to be checked."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/RegistryPromotionFailureRate.md"

      - alert: RegistryDeployFailureRate
        expr: sum(rate(registry_deploys_total{outcome="failed"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: model-registry
        annotations:
          summary: "model-registry per-instance deploy failure rate > 0.05/s for 5m"
          description: "registry_deploys_total{outcome=failed} rate is {{ $value | printf \"%.3f\" }} per-instance failures / s. registry.deploy.push_to_instance span ended in error; check the instance.url attribute on the span and the markup-svc /healthz on that URL."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/RegistryDeployFailureRate.md"

      - alert: RegistryStateDriftDetected
        expr: sum(increase(registry_state_drift_total[5m])) > 0
        for: 0m
        labels:
          severity: critical
          service: model-registry
        annotations:
          summary: "model-registry detected envstate drift on /rollback (should never happen)"
          description: "{{ $value | printf \"%.0f\" }} race-detected divergence(s) in the last 5m. A /rollback's preview-hash and committed-hash diverged because a concurrent /promote landed between the two reads. Reconcile via a follow-up /rollback before any further /promote — the data plane is currently serving `committed_hash` but the operator who issued the rollback thinks it is serving `preview_hash`."
          runbook_url: "https://github.com/helmedeiros/pricing-observability/blob/main/docs/runbooks/RegistryStateDriftDetected.md"
