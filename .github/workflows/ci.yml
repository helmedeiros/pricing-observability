name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: check-adrs + validate-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GitHub Actions ubuntu-latest ships Docker preinstalled, so
      # `docker compose config` is available without a setup step.
      - run: make ci-local
